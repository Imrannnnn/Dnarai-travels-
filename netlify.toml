[build]
base    = "client"
command = "npm run build"
publish = "dist"

[[edge_functions]]
function = "seo-preview"
path = "/blog/*"

[[edge_functions]]
function = "seo-redirects"
path = "/robots.txt"

[[edge_functions]]
function = "seo-redirects"
path = "/sitemap.xml"

[[redirects]]
from   = "/*"
to     = "/index.html"
status = 200
